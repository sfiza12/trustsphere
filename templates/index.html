<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrustSphere - IoT Trust Analytics</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0a0e1a;
            color: #e0e6f0;
            min-height: 100vh;
        }
        
        .navbar {
            background: #111827;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1e3a5f;
        }
        
        .logo {
            font-size: 22px;
            font-weight: 700;
            color: #3b9eff;
            letter-spacing: 1px;
        }
        
        .nav-links a {
            color: #94a3b8;
            text-decoration: none;
            margin-left: 24px;
            font-size: 14px;
            transition: color 0.2s;
        }
        
        .nav-links a:hover { color: #3b9eff; }
        
        .container { padding: 32px; }
        
        .page-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .page-subtitle {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 32px;
        }
        
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 32px;
        }
        
        .stat-card {
            background: #111827;
            border: 1px solid #1e3a5f;
            border-radius: 12px;
            padding: 20px;
        }
        
        .stat-label {
            font-size: 12px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: 700;
        }
        
        .table-card {
            background: #111827;
            border: 1px solid #1e3a5f;
            border-radius: 12px;
            overflow: hidden;
        }
        
        .table-header {
            padding: 20px 24px;
            border-bottom: 1px solid #1e3a5f;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .table-title { font-size: 16px; font-weight: 600; }
        
        .upload-btn {
            background: #3b9eff;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            display: inline-block;
        }
        
        .upload-btn:hover { background: #2563eb; }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        thead th {
            background: #0f172a;
            padding: 12px 24px;
            text-align: left;
            font-size: 12px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        tbody tr {
            border-top: 1px solid #1e293b;
            cursor: pointer;
            transition: background 0.15s;
        }
        
        tbody tr:hover { background: #1e293b; }
        
        tbody td {
            padding: 16px 24px;
            font-size: 14px;
        }
        
        .score-cell { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        
        .score-bar-bg {
            width: 100px;
            height: 6px;
            background: #1e293b;
            border-radius: 3px;
            overflow: hidden;
        }
        
        .score-bar-fill { height: 100%; border-radius: 3px; }
        
        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .badge-trusted  { background: #064e3b; color: #6ee7b7; }
        .badge-low      { background: #1e3a5f; color: #93c5fd; }
        .badge-medium   { background: #422006; color: #fcd34d; }
        .badge-high     { background: #4c0519; color: #fca5a5; }
        .badge-critical { background: #3b0764; color: #e879f9; }

        .recovery-badge {
            font-size: 11px;
            color: #34d399;
            background: #064e3b;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 600;
        }

        .baseline-value {
            font-size: 13px;
            color: #60a5fa;
            font-weight: 600;
        }

        .baseline-shifted {
            font-size: 13px;
            color: #a78bfa;
            font-weight: 600;
        }

        .baseline-na {
            color: #1e3a5f;
            font-size: 12px;
        }
        
        .loading {
            text-align: center;
            padding: 48px;
            color: #64748b;
        }
        
        .empty-state {
            text-align: center;
            padding: 48px;
            color: #64748b;
        }
        
        .empty-state h3 { margin-bottom: 8px; color: #94a3b8; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="logo">🛡 TrustSphere</div>
    <div class="nav-links">
        <a href="/">Dashboard</a>
        <a href="/upload-page">Upload Data</a>
        <a href="/logout" style="color: #f87171;">Logout</a>
    </div>
</nav>

<div class="container">
    <div class="page-title">Device Trust Overview</div>
    <div class="page-subtitle">Real-time behavioral trust scoring for all monitored IoT devices</div>

    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-label">Total Devices</div>
            <div class="stat-value" id="total-devices" style="color:#3b9eff">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Critical / High Risk</div>
            <div class="stat-value" id="critical-count" style="color:#f87171">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Medium Risk</div>
            <div class="stat-value" id="medium-count" style="color:#fbbf24">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Trusted</div>
            <div class="stat-value" id="trusted-count" style="color:#34d399">—</div>
        </div>
    </div>

    <div class="table-card">
        <div class="table-header">
            <div class="table-title">All Devices</div>
            <div>
                <a href="/upload-page" class="upload-btn">+ Upload Telemetry</a>
                <button class="upload-btn" style="background:#dc2626; margin-left:8px" onclick="resetDB()">Reset Demo</button>
            </div>
        </div>
        
        <div id="table-content">
            <div class="loading">Loading devices...</div>
        </div>
    </div>
</div>

<script>
    function resetDB() {
        if (!confirm('Clear all data for fresh demo?')) return;
        fetch('/api/reset', { method: 'POST' })
            .then(r => r.json())
            .then(d => { alert('Database cleared!'); loadDevices(); });
    }

    function loadDevices() {
        fetch('/api/devices')
            .then(res => res.json())
            .then(devices => {
                if (devices.length === 0) {
                    document.getElementById('table-content').innerHTML = `
                        <div class="empty-state">
                            <h3>No devices yet</h3>
                            <p>Upload a telemetry CSV to get started</p>
                            <br>
                            <a href="/upload-page" class="upload-btn">Upload Now</a>
                        </div>`;
                    document.getElementById('total-devices').textContent = '0';
                    document.getElementById('critical-count').textContent = '0';
                    document.getElementById('medium-count').textContent = '0';
                    document.getElementById('trusted-count').textContent = '0';
                    return;
                }
                
                // Update stats
                document.getElementById('total-devices').textContent = devices.length;
                document.getElementById('critical-count').textContent = 
                    devices.filter(d => ['Critical','High Risk'].includes(d.severity)).length;
                document.getElementById('medium-count').textContent = 
                    devices.filter(d => d.severity === 'Medium Risk').length;
                document.getElementById('trusted-count').textContent = 
                    devices.filter(d => d.severity === 'Trusted').length;
                
                let html = `
                    <table>
                        <thead>
                            <tr>
                                <th>Device ID</th>
                                <th>Previous Score</th>
                                <th>Current Score</th>
                                <th>Change</th>
                                <th>Severity</th>
                                <th>Baseline (pkt/min)</th>
                                <th>Drift Streak</th>
                                <th>Mode</th>
                                <th>Last Updated</th>
                            </tr>
                        </thead>
                        <tbody>`;
                
                devices.forEach(d => {
                    // Badge class
                    const badgeClass = {
                        'Trusted':     'badge-trusted',
                        'Low Risk':    'badge-low',
                        'Medium Risk': 'badge-medium',
                        'High Risk':   'badge-high',
                        'Critical':    'badge-critical'
                    }[d.severity] || 'badge-low';
                    
                    // Current score bar color
                    const barColor = d.trust_score >= 80 ? '#34d399' :
                                     d.trust_score >= 60 ? '#60a5fa' :
                                     d.trust_score >= 40 ? '#fbbf24' :
                                     d.trust_score >= 20 ? '#f87171' : '#e879f9';

                    // Previous score bar color
                    const prevColor = (d.previous_score || 0) >= 80 ? '#34d399' :
                                      (d.previous_score || 0) >= 60 ? '#60a5fa' :
                                      (d.previous_score || 0) >= 40 ? '#fbbf24' :
                                      (d.previous_score || 0) >= 20 ? '#f87171' : '#e879f9';
                    
                    // Date
                    const updated = d.last_updated ? 
                        new Date(d.last_updated).toLocaleDateString() : '—';
                    
                    // Previous score
                    const prevScore = (d.previous_score !== null && d.previous_score !== undefined)
                        ? d.previous_score : '—';
                    
                    // Change display
                    let changeHtml = '<span style="color:#64748b">— 0</span>';
                    if (d.change !== null && d.change !== undefined) {
                        if (d.change > 0) {
                            changeHtml = `<span style="color:#34d399;font-weight:700">▲ +${d.change}</span>`;
                        } else if (d.change < 0) {
                            changeHtml = `<span style="color:#f87171;font-weight:700">▼ ${d.change}</span>`;
                        } else {
                            changeHtml = `<span style="color:#64748b">— 0</span>`;
                        }
                    }

                    // Recovery badge — show when score went UP
                    const recoveryHtml = (d.change > 0)
                        ? `<span class="recovery-badge">▲ +5 recovering</span>`
                        : '';

                    // Baseline display — purple if drift_streak >= 3 (adaptation happening)
                    let baselineHtml = '<span class="baseline-na">not set</span>';
                    if (d.baseline_packets !== null && d.baseline_packets !== undefined) {
                        if (d.drift_streak >= 3) {
                            baselineHtml = `<span class="baseline-shifted" title="Baseline adapting">${d.baseline_packets.toFixed(1)} ⟳</span>`;
                        } else {
                            baselineHtml = `<span class="baseline-value">${d.baseline_packets.toFixed(1)}</span>`;
                        }
                    }

                    html += `
                        <tr onclick="window.location='/device-page/${d.device_id}'">
                            <td><strong>${d.device_id}</strong></td>
                            <td>
                                <div class="score-cell" style="cursor:pointer" title="View previous score explanation" onclick="event.stopPropagation(); window.location='/device-page/${d.device_id}?view=previous'">
                                    <strong style="color:#64748b">${prevScore}</strong>
                                    ${(d.previous_score !== null && d.previous_score !== undefined) ? `
                                    <div class="score-bar-bg">
                                        <div class="score-bar-fill"
                                             style="width:${d.previous_score}%; background:${prevColor}; opacity:0.5">
                                        </div>
                                    </div>` : ''}
                                </div>
                            </td>
                            <td>
                                <div class="score-cell" style="cursor:pointer" title="View current score explanation" onclick="event.stopPropagation(); window.location='/device-page/${d.device_id}?view=current'">
                                    <strong>${d.trust_score}</strong>
                                    <div class="score-bar-bg">
                                        <div class="score-bar-fill"
                                             style="width:${d.trust_score}%; background:${barColor}">
                                        </div>
                                    </div>
                                    ${recoveryHtml}
                                </div>
                            </td>
                            <td>${changeHtml}</td>
                            <td><span class="badge ${badgeClass}">${d.severity}</span></td>
                            <td>${baselineHtml}</td>
                            <td>${d.drift_streak || 0} hours</td>
                            <td style="font-weight:600;color:#93c5fd">${d.mode || 'NORMAL'}</td>
                            <td style="color:#64748b">${updated}</td>
                        </tr>`;
                });
                
                html += '</tbody></table>';
                document.getElementById('table-content').innerHTML = html;
            })
            .catch(() => {
                document.getElementById('table-content').innerHTML = 
                    '<div class="loading">Error loading devices. Is the server running?</div>';
            });
    }
    
    loadDevices();
    setInterval(loadDevices, 30000);
</script>

</body>
</html>
