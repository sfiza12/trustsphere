<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrustSphere - Register</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0a0e1a;
            color: #e0e6f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .navbar {
            background: #111827;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1e3a5f;
        }
        
        .logo {
            font-size: 22px;
            font-weight: 700;
            color: #3b9eff;
            letter-spacing: 1px;
            text-decoration: none;
        }
        
        .container {
            display: flex;
            flex: 1;
            align-items: center;
            justify-content: center;
            padding: 32px;
        }
        
        .auth-card {
            background: #111827;
            border: 1px solid #1e3a5f;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        
        .auth-card h2 {
            margin-bottom: 24px;
            text-align: center;
            font-size: 24px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #94a3b8;
            font-size: 14px;
        }
        
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        
        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #3b9eff;
        }
        
        button {
            width: 100%;
            background: #3b9eff;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin-top: 10px;
            transition: background 0.2s;
        }
        
        button:hover { background: #2563eb; }
        
        .flash-messages {
            margin-bottom: 20px;
        }
        
        .flash-message {
            background: #4c0519;
            color: #fca5a5;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 14px;
            border: 1px solid #881337;
            text-align: center;
        }
        
        .auth-links {
            margin-top: 24px;
            text-align: center;
        }
        
        .auth-links a {
            color: #3b9eff;
            text-decoration: none;
            font-size: 14px;
        }
        
        .auth-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <a href="/" class="logo">🛡 TrustSphere</a>
</nav>

<div class="container">
    <div class="auth-card">
        <h2>Register</h2>
        
        <div class="flash-messages">
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for message in messages %}
                  <div class="flash-message">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}
        </div>
        
        <form method="POST" action="/register">
            <div class="form-group">
                <label for="username">Choose Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Create Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit">Create Account</button>
        </form>
        
        <div class="auth-links">
            <a href="/login">Already have an account? Login here.</a>
        </div>
    </div>
</div>

</body>
</html>
